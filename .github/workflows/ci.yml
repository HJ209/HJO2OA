name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify backend
        run: mvn -B verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Verify frontend
        run: npm run frontend:verify

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required documentation
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "docs/architecture/backend-architecture-spec.md"
            "docs/architecture/frontend-architecture-spec.md"
            "docs/contracts/unified-api-contract.md"
            "docs/contracts/unified-event-contract.md"
          )
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty required document: $file" >&2
              exit 1
            fi
          done
