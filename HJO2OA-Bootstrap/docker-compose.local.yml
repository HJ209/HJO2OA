services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2017-latest-ubuntu
    container_name: hjo2oa-local-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: 'Hjo2oa@2026!'
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Hjo2oa@2026!' -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2017-latest-ubuntu
    container_name: hjo2oa-local-sqlserver-init
    depends_on:
      - sqlserver
    environment:
      MSSQL_SA_PASSWORD: 'Hjo2oa@2026!'
    entrypoint:
      - /bin/bash
      - -c
      - |
        until /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" > /dev/null 2>&1; do
          sleep 2
        done
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "IF DB_ID(N'hjo2oa_local') IS NULL CREATE DATABASE [hjo2oa_local];"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: hjo2oa-local-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: hjo2oa-local-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: hjo2oa-local-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    container_name: hjo2oa-local-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/hjo2oa-local
        /usr/bin/mc anonymous set download local/hjo2oa-local
    restart: "no"

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:
  minio-data:
