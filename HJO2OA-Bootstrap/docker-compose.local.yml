services:
  postgres:
    image: postgres:16-alpine
    container_name: hjo2oa-local-postgres
    environment:
      POSTGRES_DB: hjo2oa_local
      POSTGRES_USER: hjo2oa
      POSTGRES_PASSWORD: hjo2oa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hjo2oa -d hjo2oa_local"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hjo2oa-local-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: hjo2oa-local-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: hjo2oa-local-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    container_name: hjo2oa-local-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/hjo2oa-local
        /usr/bin/mc anonymous set download local/hjo2oa-local
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
