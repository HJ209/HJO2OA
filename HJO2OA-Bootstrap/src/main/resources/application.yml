server:
  port: 8080

spring:
  application:
    name: hjo2oa
  profiles:
    active: local
  datasource:
    url: "${HJO2OA_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=hjo2oa;encrypt=true;trustServerCertificate=true}"
    username: ${HJO2OA_DB_USERNAME:sa}
    password: ${HJO2OA_DB_PASSWORD:123456}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    default-schema: dbo
    locations: classpath:db/migration/sqlserver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: hjo2oa-schedule-

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,readiness,liveness
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

mybatis-plus:
  type-handlers-package: com.hjo2oa.shared.persistence
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

hjo2oa:
  workflow:
    engine: flowable
  tenant:
    enabled: true
    ignore-tables:
      - sys_config
      - sys_dictionary
  security:
    jwt:
      secret: change-me-in-production
      expiration: 86400000
    crypto:
      master-secret: ${HJO2OA_SECURITY_CRYPTO_MASTER_SECRET:${hjo2oa.security.jwt.secret}}
    masking:
      response-enabled: true
  infra:
    attachment:
      local-root: ${HJO2OA_ATTACHMENT_LOCAL_ROOT:${user.dir}/target/hjo2oa-attachments}
      max-size-bytes: ${HJO2OA_ATTACHMENT_MAX_SIZE_BYTES:52428800}
      allowed-content-types:
        - application/pdf
        - image/png
        - image/jpeg
        - image/gif
        - text/plain
        - text/csv
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
  audit:
    enabled: true
  messaging:
    outbox:
      enabled: true
      scan-interval: 5000
      retry:
        max-retries: 5
        initial-interval-seconds: 1
        multiplier: 2
        max-interval-seconds: 60
      amqp:
        enabled: true
        exchange-name: hjo2oa.domain.events
        queue-name: hjo2oa.domain.events.local
  storage:
    type: minio
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: hjo2oa
  cache:
    type: redis
  data-services:
    sync:
      schedule-poller-interval: 60000
    report:
      refresh-cron: "0 0/30 * * * *"
      refresh-batch-size: 10
    governance:
      health-check-cron: "0 0/5 * * * *"
      alert-dedup-minutes: 30
      trace-auto-resolve-minutes: 60
    openapi:
      auth:
        signature-algorithm: HmacSHA256
        clock-skew-seconds: 300
      quota:
        default-window-value: 1
        default-window-unit: HOURS
        default-threshold: 1000

flowable:
  check-process-definitions: false
  database-schema-update: true
  history-level: full
