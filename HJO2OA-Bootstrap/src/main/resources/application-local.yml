spring:
  main:
    lazy-initialization: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    url: "${HJO2OA_LOCAL_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=hjo2oa_dev;encrypt=true;trustServerCertificate=true}"
    username: ${HJO2OA_LOCAL_DB_USERNAME:sa}
    password: ${HJO2OA_LOCAL_DB_PASSWORD:123456}
  data:
    redis:
      host: ${HJO2OA_LOCAL_REDIS_HOST:localhost}
      port: ${HJO2OA_LOCAL_REDIS_PORT:6379}
      password: ${HJO2OA_LOCAL_REDIS_PASSWORD:}

hjo2oa:
  storage:
    endpoint: ${HJO2OA_LOCAL_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${HJO2OA_LOCAL_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${HJO2OA_LOCAL_MINIO_SECRET_KEY:minioadmin}
    bucket: ${HJO2OA_LOCAL_MINIO_BUCKET:hjo2oa-local}
  data-services:
    sync:
      schedule-poller-interval: 300000
    report:
      refresh-cron: "0 0 * * * *"
    governance:
      health-check-cron: "0 0/10 * * * *"

logging:
  level:
    com.hjo2oa: DEBUG
    com.hjo2oa.data: DEBUG
