spring:
  datasource:
    url: ${HJO2OA_LOCAL_DB_URL:jdbc:postgresql://localhost:5432/hjo2oa_local}
    username: ${HJO2OA_LOCAL_DB_USERNAME:hjo2oa}
    password: ${HJO2OA_LOCAL_DB_PASSWORD:hjo2oa}
  data:
    redis:
      host: ${HJO2OA_LOCAL_REDIS_HOST:localhost}
      port: ${HJO2OA_LOCAL_REDIS_PORT:6379}
      password: ${HJO2OA_LOCAL_REDIS_PASSWORD:}
  rabbitmq:
    host: ${HJO2OA_LOCAL_RABBITMQ_HOST:localhost}
    port: ${HJO2OA_LOCAL_RABBITMQ_PORT:5672}
    username: ${HJO2OA_LOCAL_RABBITMQ_USERNAME:guest}
    password: ${HJO2OA_LOCAL_RABBITMQ_PASSWORD:guest}

hjo2oa:
  storage:
    endpoint: ${HJO2OA_LOCAL_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${HJO2OA_LOCAL_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${HJO2OA_LOCAL_MINIO_SECRET_KEY:minioadmin}
    bucket: ${HJO2OA_LOCAL_MINIO_BUCKET:hjo2oa-local}

logging:
  level:
    com.hjo2oa: DEBUG
